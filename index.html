<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophy Club</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(45deg, #ff0080, #8000ff, #00ff80, #0080ff);
            background-size: 300% 300%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
            margin: 0;
        }
        p {
            font-size: 1.5em;
        }
        .info {
            font-size: 1.2em;
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Philosophy Club!</h1>
        <p>Join us for vibrant discussions and explorations of philosophical ideas.</p>
        <div class="info">
            <p><strong>Meeting Info:</strong></p>
            <p>📅 Axinn Wednesday 6-7 PM</p>
            <p>📧 Email us at <a href="mailto:plato@middlebury.edu">plato@middlebury.edu</a></p>
            <p><a href="https://your.presence.link">Join us on Presence</a></p>
        </div>
    </div>
</body>
</html>
